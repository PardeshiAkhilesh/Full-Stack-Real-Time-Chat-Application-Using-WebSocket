<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradients -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#090d16" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Glowing background -->
  <rect width="600" height="400" fill="#090d16" rx="12"/>
  <circle cx="300" cy="200" r="250" fill="url(#glow)"/>

  <!-- Glassmorphic Card -->
  <rect x="100" y="80" width="400" height="240" rx="20" fill="url(#cardGrad)" stroke="url(#borderGrad)" stroke-width="1.5"/>

  <!-- Icon: Signal Off / Camera Off -->
  <g transform="translate(268, 120)">
    <!-- Red Alert Circle -->
    <circle cx="32" cy="32" r="32" fill="#ef4444" fill-opacity="0.12"/>
    
    <!-- Crossed Video Camera Icon Outline -->
    <rect x="18" y="22" width="20" height="20" rx="3" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M38 27L46 22V42L38 37V27Z" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="12" y1="12" x2="52" y2="52" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Error Text -->
  <text x="300" y="235" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="18" font-weight="700" fill="#f8fafc" text-anchor="middle">Live Stream Offline</text>
  <text x="300" y="260" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="13" font-weight="400" fill="#94a3b8" text-anchor="middle">Waiting for KVM stream or camera connection...</text>
  <text x="300" y="280" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" font-weight="500" fill="#64748b" text-anchor="middle">Click "Live Feed" to switch modes or retry</text>
</svg>
